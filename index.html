<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="로또 번호 생성기">
    <title>로또 번호 생성기</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .ad-top, .ad-bottom {
            width: 100%;
            max-width: 728px;
            margin: 20px 0;
            text-align: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin: 30px 0;
        }

        .number-ball {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 600;
            color: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            margin: 0 auto;
        }

        @media (max-width: 600px) {
            .number-ball {
                width: 45px;
                height: 45px;
                font-size: 18px;
            }
        }

        .lotto-set {
            margin-bottom: 20px;
        }

        button {
            background: #007AFF;
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            margin: 8px;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
            transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            background: #0A5FD7;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 122, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .button-group {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="ad-top">
        <ins class="kakao_ad_area" style="display:none;" data-ad-unit = "DAN-BgfOj9Dc8sRYwDzR" data-ad-width = "728" data-ad-height = "90"></ins>
        <script type="text/javascript" src="//t1.daumcdn.net/kas/static/ba.min.js" async></script>
    </div>

    <div class="container">
        <h1>로또 번호 생성기</h1>
        <div id="numbersDisplay"></div>
        <div class="button-group">
            <button onclick="generateLotto()">번호 생성</button>
            <button onclick="generateMultiple()">5개 생성</button>
        </div>
    </div>

    <div class="ad-bottom">
        <ins class="kakao_ad_area" style="display:none;" data-ad-unit = "DAN-BgfOj9Dc8sRYwDzR" data-ad-width = "728" data-ad-height = "90"></ins>
        <script type="text/javascript" src="//t1.daumcdn.net/kas/static/ba.min.js" async></script>
    </div>

    <script>
        const colors = ['#FFB400', '#FF7300', '#FF4200', '#4B91D9', '#5DA9D4'];
        const colorMap = [10, 20, 30, 40, 45];

        function getColorForNumber(num) {
            for (let i = 0; i < colorMap.length; i++) {
                if (num <= colorMap[i]) return colors[i];
            }
        }

        function generateNumbers() {
            const numbers = new Set();
            while (numbers.size < 6) {
                numbers.add(Math.floor(Math.random() * 45) + 1);
            }
            return Array.from(numbers).sort((a, b) => a - b);
        }

        function displayNumbers(numberSets) {
            const display = document.getElementById('numbersDisplay');
            display.innerHTML = numberSets.map((numbers, setIndex) => 
                `<div class="lotto-set"><div class="numbers-grid">${
                    numbers.map(num => 
                        `<div class="number-ball" style="background: ${getColorForNumber(num)}">${num}</div>`
                    ).join('')
                }</div></div>`
            ).join('');
        }

        function generateLotto() {
            displayNumbers([generateNumbers()]);
        }

        function generateMultiple() {
            const results = Array.from({length: 5}, generateNumbers);
            displayNumbers(results);
        }
    </script>
</body>
</html>
